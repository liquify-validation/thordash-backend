name: Claude PR Review

on:
  # Trigger when someone comments on a PR
  issue_comment:
    types: [created]
  # Trigger when someone comments on a PR diff
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    # Only run when the comment contains "@claude" and is on a PR
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR thoroughly. Focus on:
            - Bugs and logic errors
            - Security vulnerabilities
            - Performance issues
            - Code style and consistency

            Post inline comments on specific lines where you find issues.
            If everything looks good, leave a short approval comment.
            Be concise — only flag things that actually matter.
          claude_args: "--model claude-sonnet-4-6 --max-turns 5"
